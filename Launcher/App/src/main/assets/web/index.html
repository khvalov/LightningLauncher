<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning Launcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a1a2e; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 8px #0005; }
  header h1 { font-size: 1.1rem; color: #a0c4ff; white-space: nowrap; }
  #search { flex: 1; background: #252535; border: 1px solid #444; border-radius: 8px; padding: 7px 13px; color: #e0e0e0; font-size: 0.95rem; outline: none; }
  #search:focus { border-color: #a0c4ff; }
  #count { color: #666; font-size: 0.8rem; white-space: nowrap; min-width: 50px; text-align: right; }

  /* Group tabs bar */
  #groups-bar { background: #141424; border-bottom: 1px solid #2a2a3a; padding: 0 8px; display: flex; gap: 4px; overflow-x: auto; position: sticky; top: 49px; z-index: 10; scrollbar-width: none; }
  #groups-bar::-webkit-scrollbar { display: none; }
  .group-tab { padding: 8px 14px; font-size: 0.82rem; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; color: #888; transition: color 0.15s, border-color 0.15s; user-select: none; }
  .group-tab:hover { color: #ccc; }
  .group-tab.active { color: #a0c4ff; border-bottom-color: #a0c4ff; }
  .group-tab .badge { font-size: 0.68rem; color: #555; margin-left: 4px; }
  .group-tab.active .badge { color: #6080b0; }

  /* App grid */
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 16px; }
  .card { background: #1e1e2e; border-radius: 10px; padding: 12px 8px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; border: 1px solid #2a2a3a; transition: background 0.12s, transform 0.1s; user-select: none; }
  .card:hover { background: #2a2a40; transform: scale(1.04); }
  .card:active { transform: scale(0.97); }
  .card img { width: 64px; height: 64px; object-fit: contain; border-radius: 8px; background: #111; }
  .card span { font-size: 0.72rem; text-align: center; line-height: 1.3; word-break: break-word; color: #ccc; }

  #empty { display: none; color: #555; text-align: center; padding: 60px 20px; font-size: 0.95rem; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e1e3e; color: #a0c4ff; padding: 9px 20px; border-radius: 20px; border: 1px solid #3a3a5a; font-size: 0.9rem; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 100; }
  #toast.show { opacity: 1; }

  /* Screen cast */
  #castBtn { background: #252535; border: 1px solid #444; border-radius: 8px; color: #a0c4ff; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
  #castBtn:hover { background: #2a2a45; }
  #castModal { display: none; position: fixed; inset: 0; background: #000a; z-index: 200; align-items: center; justify-content: center; }
  #castModal.open { display: flex; }
  #castBox { background: #111; border-radius: 12px; padding: 16px; max-width: 95vw; max-height: 95vh; display: flex; flex-direction: column; gap: 10px; }
  #castHeader { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  #castHeader h2 { color: #a0c4ff; font-size: 1rem; margin: 0; }
  #castClose { background: #333; border: none; color: #ccc; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
  #castClose:hover { background: #444; }
  #castStatus { color: #888; font-size: 0.9rem; text-align: center; padding: 20px 0; }
  #castImg { display: none; max-width: 100%; max-height: 80vh; border-radius: 6px; object-fit: contain; }
</style>
</head>
<body>
<header>
  <h1>⚡ Lightning Launcher</h1>
  <input id="search" type="text" placeholder="Search…" autocomplete="off" />
  <span id="count"></span>
  <button id="castBtn" onclick="openCast()">📺 Screen</button>
</header>

<div id="castModal">
  <div id="castBox">
    <div id="castHeader">
      <h2>📺 Screen Cast</h2>
      <button id="castClose" onclick="closeCast()">✕ Close</button>
    </div>
    <p id="castStatus">Approve screen capture on the headset…</p>
    <img id="castImg" alt="Screen cast" />
  </div>
</div>
<div id="groups-bar"></div>
<div id="grid"></div>
<div id="empty">No apps found</div>
<div id="toast"></div>

<script>
let allApps = [];
let groups = [];
let selectedGroup = '__all__';

async function init() {
  const [appsRes, groupsRes] = await Promise.all([
    fetch('/api/apps'),
    fetch('/api/groups')
  ]).catch(e => { showEmpty('Failed to load: ' + e.message); return [null, null]; });

  if (!appsRes) return;
  allApps = await appsRes.json();
  groups = await groupsRes.json();

  renderGroupTabs();
  render();
}

function renderGroupTabs() {
  const bar = document.getElementById('groups-bar');
  bar.innerHTML = '';

  const allTab = makeTab('All', allApps.length, '__all__');
  bar.appendChild(allTab);

  for (const g of groups) {
    bar.appendChild(makeTab(g.name, g.count, g.name));
  }
}

function makeTab(label, count, key) {
  const tab = document.createElement('div');
  tab.className = 'group-tab' + (selectedGroup === key ? ' active' : '');
  tab.innerHTML = esc(label) + ' <span class="badge">' + count + '</span>';
  tab.addEventListener('click', () => {
    selectedGroup = key;
    document.getElementById('search').value = '';
    document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render();
  });
  return tab;
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let apps = allApps;

  // Filter by group
  if (selectedGroup !== '__all__') {
    apps = apps.filter(a => a.group === selectedGroup);
  }

  // Filter by search
  if (q) {
    apps = apps.filter(a =>
      a.label.toLowerCase().includes(q) ||
      a.packageName.toLowerCase().includes(q)
    );
  }

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = apps.length + ' app' + (apps.length !== 1 ? 's' : '');

  if (apps.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    empty.textContent = q ? 'No results for "' + q + '"' : 'No apps in this group';
    return;
  }
  empty.style.display = 'none';

  const frag = document.createDocumentFragment();
  for (const app of apps) {
    const card = document.createElement('div');
    card.className = 'card';
    const encoded = encodeURIComponent(app.packageName);
    card.innerHTML =
      '<img src="/api/icon/' + encoded + '" loading="lazy" onerror="this.style.opacity=\'0.2\'">' +
      '<span>' + esc(app.label) + '</span>';
    card.addEventListener('click', () => launch(app));
    frag.appendChild(card);
  }
  grid.innerHTML = '';
  grid.appendChild(frag);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function launch(app) {
  showToast('Launching ' + app.label + '…');
  try {
    const r = await fetch('/api/launch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({packageName: app.packageName})
    });
    const data = await r.json();
    if (!data.success) showToast('Failed: ' + (data.error || 'unknown'));
  } catch(e) {
    showToast('Error: ' + e.message);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function showEmpty(msg) {
  const e = document.getElementById('empty');
  e.textContent = msg;
  e.style.display = 'block';
}

// Search — switch to All tab when typing
document.getElementById('search').addEventListener('input', function() {
  if (this.value) {
    selectedGroup = '__all__';
    document.querySelectorAll('.group-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  }
  render();
});

init();

function openCast() {
  const modal = document.getElementById('castModal');
  const img = document.getElementById('castImg');
  const status = document.getElementById('castStatus');
  modal.classList.add('open');
  status.style.display = 'block';
  status.textContent = 'Approve screen capture on the headset…';
  img.style.display = 'none';
  img.onerror = () => { status.textContent = 'Permission denied or connection lost.'; img.style.display = 'none'; };
  img.src = '/api/screencast';
  // MJPEG never fires onload — show the img immediately and let the browser render frames
  img.style.display = 'block';
  status.style.display = 'none';
}

function closeCast() {
  const img = document.getElementById('castImg');
  img.src = '';
  img.onload = null;
  img.onerror = null;
  document.getElementById('castModal').classList.remove('open');
}

document.getElementById('castModal').addEventListener('click', function(e) {
  if (e.target === this) closeCast();
});
</script>
</body>
</html>
