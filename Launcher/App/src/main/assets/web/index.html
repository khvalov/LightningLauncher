<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning Launcher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: sans-serif; min-height: 100vh; }
  header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px #0005; }
  header h1 { font-size: 1.2rem; color: #a0c4ff; white-space: nowrap; }
  #search { flex: 1; background: #252535; border: 1px solid #444; border-radius: 8px; padding: 8px 14px; color: #e0e0e0; font-size: 1rem; outline: none; }
  #search:focus { border-color: #a0c4ff; }
  #count { color: #888; font-size: 0.85rem; white-space: nowrap; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 20px; }
  .card { background: #1e1e2e; border-radius: 12px; padding: 14px 10px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; border: 1px solid #2a2a3a; transition: background 0.15s, transform 0.1s; user-select: none; }
  .card:hover { background: #2a2a40; transform: scale(1.04); }
  .card:active { transform: scale(0.97); }
  .card img { width: 72px; height: 72px; object-fit: contain; border-radius: 8px; background: #111; }
  .card span { font-size: 0.75rem; text-align: center; line-height: 1.3; word-break: break-word; color: #ccc; }
  .badge { font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; background: #333; color: #999; align-self: flex-start; }
  .badge.VR { background: #1a3a5c; color: #7ec8e3; }
  .badge.PHONE { background: #1c3a1c; color: #7ecf7e; }
  .badge.TV { background: #3a1a1a; color: #e37e7e; }
  .badge.WEB { background: #2a1a3a; color: #b87ee3; }
  .badge.PANEL { background: #2a2a1a; color: #e3d07e; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: #a0c4ff; padding: 10px 22px; border-radius: 24px; border: 1px solid #444; font-size: 0.95rem; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 100; }
  #toast.show { opacity: 1; }
  #empty { display: none; color: #666; text-align: center; padding: 60px 20px; font-size: 1rem; }
</style>
</head>
<body>
<header>
  <h1>⚡ Lightning Launcher</h1>
  <input id="search" type="text" placeholder="Search apps…" autocomplete="off" />
  <span id="count"></span>
</header>
<div id="grid"></div>
<div id="empty">No apps found</div>
<div id="toast"></div>
<script>
let allApps = [];

async function loadApps() {
  try {
    const r = await fetch('/api/apps');
    allApps = await r.json();
    render(allApps);
  } catch(e) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = 'Could not load apps: ' + e.message;
  }
}

function render(apps) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');
  grid.innerHTML = '';
  count.textContent = apps.length + ' app' + (apps.length !== 1 ? 's' : '');
  if (apps.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const frag = document.createDocumentFragment();
  for (const app of apps) {
    const card = document.createElement('div');
    card.className = 'card';
    const encoded = encodeURIComponent(app.packageName);
    card.innerHTML =
      `<img src="/api/icon/${encoded}" loading="lazy" onerror="this.style.opacity='0.3'">` +
      `<span class="badge ${app.type}">${app.type}</span>` +
      `<span>${esc(app.label)}</span>`;
    card.addEventListener('click', () => launch(app));
    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function launch(app) {
  showToast('Launching ' + app.label + '…');
  try {
    const r = await fetch('/api/launch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({packageName: app.packageName})
    });
    const data = await r.json();
    if (!data.success) showToast('Failed: ' + (data.error || 'unknown error'));
  } catch(e) {
    showToast('Error: ' + e.message);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  render(q ? allApps.filter(a => a.label.toLowerCase().includes(q) || a.packageName.toLowerCase().includes(q)) : allApps);
});

loadApps();
</script>
</body>
</html>
